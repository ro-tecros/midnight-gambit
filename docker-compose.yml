# =============================================================================
#  Midnight Gambit · orquestación con Docker Compose
#  Levanta dos servicios: PostgreSQL y la aplicación Node (API + WebSockets +
#  cliente estático). Arranque con:  docker compose up --build
# =============================================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-chess}
      POSTGRES_PASSWORD: ${PGPASSWORD:-chess}
      POSTGRES_DB: ${PGDATABASE:-chess}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PGUSER:-chess} -d ${PGDATABASE:-chess}']
      interval: 5s
      timeout: 5s
      retries: 10
    # Puerto expuesto solo para inspección local opcional.
    ports:
      - '${PGPORT:-5432}:5432'

  app:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-to-a-long-random-string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DATABASE_URL: postgres://${PGUSER:-chess}:${PGPASSWORD:-chess}@db:5432/${PGDATABASE:-chess}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RECONNECT_GRACE_SECONDS: ${RECONNECT_GRACE_SECONDS:-60}
      ABANDON_GRACE_SECONDS: ${ABANDON_GRACE_SECONDS:-30}
    ports:
      - '${APP_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
