app = "midnight-gambit"
primary_region = "mad"

[build]
  dockerfile = "server/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT     = "4000"

[http_service]
  internal_port       = 4000
  force_https         = true
  auto_stop_machines  = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 256
